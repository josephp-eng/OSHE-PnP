# ============================================================
# PICK AND PLACE MACHINE - KLIPPER CONFIG
# Ender 3 Mechanics + Octopus Pro + TMC5160T Drivers
# Raspberry Pi 5 Host
# ============================================================

###############################
#Printer Config
###############################

[include mainsail.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_280028000751313339373836-if00

[printer]
kinematics: cartesian
max_velocity: 400
max_accel: 3000
square_corner_velocity: 5.0
max_z_velocity: 200
max_z_accel: 3000

[force_move]
enable_force_move: True

[include moonraker_obico_macros.cfg]

[fan]
pin: PA8
max_power: 1.0

[board_pins]
aliases:
    EXP1_1=PE8, EXP1_2=PE7,
    EXP1_3=PE9, EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,
    EXP1_7=PE14, EXP1_8=PE15

[display]
lcd_type: st7920
cs_pin: EXP1_7
sclk_pin: EXP1_6
sid_pin: EXP1_8
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1


###############################
#Steppers
###############################

#Stepper X
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_min: -5
position_endstop: 0
position_max: 260
homing_speed: 40
homing_retract_dist: 0

[tmc5160 stepper_x]
cs_pin: PC4
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
diag1_pin: ^!PG6
run_current: 0.800
stealthchop_threshold: 50
driver_SGT: 5
#2nd X Axis (X1)
[stepper_x1]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200

[tmc5160 stepper_x1]
cs_pin: PF2
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
run_current: 0.800
stealthchop_threshold: 50
#Stepper Y
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_min: -5
position_endstop: 0
position_max: 195
homing_speed: 40
homing_retract_dist: 0

[tmc5160 stepper_y]
cs_pin: PD11
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
diag1_pin: ^!PG9
run_current: 0.800
stealthchop_threshold: 50
driver_SGT: 1

#Stepper Z
[stepper_z]
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: tmc5160_stepper_z:virtual_endstop
position_endstop: 0
position_max: 80
homing_speed: 40
homing_retract_dist: 0

[tmc5160 stepper_z]
cs_pin: PC6
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
diag1_pin: ^!PG10
run_current: 0.400
stealthchop_threshold: 50
driver_SGT: 4

# TOOLHEAD ROTATION
[manual_stepper toolhead_rotation]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA2
microsteps: 16
rotation_distance: 360
gear_ratio: 36:30
full_steps_per_rotation: 200
velocity: 100
accel: 1000

[tmc5160 manual_stepper toolhead_rotation]
cs_pin: PC7
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
run_current: 0.400
stealthchop_threshold: 0

###############################
#Macros
###############################
[homing_override]
axes: xyz
gcode:
    # Check which axes were explicitly requested (e.g., G28 X vs G28)
    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
    
    # 1. Home Z, then move to a safe clearance height
    {% if home_all or 'Z' in params %}
        G28 Z
        # Moves Z to 99mm at 200mm/s (12000 mm/min)
        G1 Z80 F12000 
    {% endif %}
    
    # 2. Home Y
    {% if home_all or 'Y' in params %}
        G28 Y
        # Best practice for sensorless: back off the physical hard stop slightly
        G1 Y5 F1200
    {% endif %}
    
    # 3. Home X
    {% if home_all or 'X' in params %}
        G28 X
        # Best practice for sensorless: back off the physical hard stop slightly
        G1 X5 F1200
    {% endif %}
    
    # 4. Zero the Toolhead Rotation (C-Axis)
    {% if home_all %}
        # Instantly sets the current position of the manual stepper to 0
        MANUAL_STEPPER STEPPER=toolhead_rotation SET_POSITION=0
    {% endif %}

# VACUUM PUMP CONTROL
[output_pin vacuum_pump]
pin: PA1
value: 0
shutdown_value: 0

[gcode_macro PUMP_ON]
description: Turns on the vacuum pump
gcode:
    SET_PIN PIN=vacuum_pump VALUE=1

[gcode_macro PUMP_OFF]
description: Turns off the vacuum pump
gcode:
    SET_PIN PIN=vacuum_pump VALUE=0

[gcode_macro TOGGLE_PUMP]
description: Toggles the vacuum pump state (useful for physical buttons or web UI)
gcode:
    {% if printer['output_pin vacuum_pump'].value == 0 %}
        PUMP_ON
    {% else %}
        PUMP_OFF
    {% endif %}

# SOLENIOD CONTROL
[output_pin valve]
pin: PE5
value: 0
shutdown_value: 0

[gcode_macro VALVE_ON]
description: Opens the solenoid valve
gcode:
    SET_PIN PIN=valve VALUE=1

[gcode_macro VALVE_OFF]
description: Closes the solenoid valve
gcode:
    SET_PIN PIN=valve VALUE=0

[gcode_macro TOGGLE_VALVE]
description: Toggles the solenoid valve state
gcode:
    {% if printer['output_pin valve'].value == 0 %}
        VALVE_ON
    {% else %}
        VALVE_OFF
    {% endif %}

# PICK COMPONENT MACRO
[gcode_macro PICK]
description: Moves to a specified spool, lowers, grabs a component, and retracts.
gcode:
    # --- CONFIGURATION VARIABLES ---
    {% set base_x = 45.0 %}      # X coordinate of Spool 1
    {% set base_y = 190.0 %}     # Y coordinate of Spool 1
    
    # Set the offset depending on how your spools are lined up. 
    {% set offset_x = 0.0 %}    # Distance between each spool on the X axis
    {% set offset_y = 0.0 %}     # Distance between each spool on the Y axis
    
    {% set z_safe = 80.0 %}      # Safe Z height for travel to avoid collisions
    {% set z_pick = 66.0 %}       # Z height to touch the component
    
    {% set speed_xy = 9000 %}    # XY travel speed (mm/min)
    {% set speed_z = 6000 %}     # Z plunge/retract speed (mm/min)
    {% set dwell_time = 250 %}   # Time to wait for vacuum to build (milliseconds)
    
    # --- INPUT PARAMETER ---
    # Get the requested spool number from the command. Default to 1 if none provided.
    {% set spool_num = params.SPOOL|default(1)|int %}
    
    # --- SAFETY CHECK ---
    {% if spool_num < 1 or spool_num > 5 %}
        { action_raise_error("Invalid spool number! Must be between 1 and 5.") }
    {% else %}
        
        # --- CALCULATE TARGET COORDINATES ---
        # Subtract 1 from the spool number so Spool 1 multiplies the offset by 0
        {% set target_x = base_x + ((spool_num - 1) * offset_x) %}
        {% set target_y = base_y + ((spool_num - 1) * offset_y) %}
        
        G90 #Abs Positioning         
        G1 Z{z_safe} F{speed_z}       
        G1 X{base_x+25} F{speed_xy}
        # 2. Travel to the calculated XY position
        G1 Y{target_y} F{speed_xy}
        G1 X{target_x} F{speed_xy}  
        # 3. Lower Z to the pick height
        G1 Z{z_pick} F{speed_z}  
        # 4. Turn on the vacuum pump
        PUMP_ON
        # 5. Wait momentarily for vacuum pressure to stabilize
        G4 P{dwell_time}
        VALVE_ON
        G4 P{dwell_time} 
        # 6. Retract Z back to safe height with the component attached
        G1 Z{z_safe} F{speed_z}        
    {% endif %}

#Place Macro
[gcode_macro PLACE]
description: Moves to a specified X/Y coordinate, lowers, releases a component, and retracts.
gcode:
    # --- CONFIGURATION VARIABLES ---
    {% set z_safe = 80.0 %}      # Safe Z height for travel to avoid collisions
    {% set z_place = 20.0 %}      # Z height to place the component (adjust for your PCB/bed height)
    {% set target_z = params.Z|default(default_z_place)|float %}
    
    {% set speed_xy = 9000 %}    # XY travel speed (mm/min)
    {% set speed_z = 6000 %}     # Z plunge/retract speed (mm/min)
    {% set dwell_time = 500 %}   # Time to wait for vacuum to release (milliseconds)
    
    # --- INPUT PARAMETERS & SAFETY CHECK ---
    # Ensure both X and Y were provided in the command (e.g., PLACE X=150 Y=150)
    {% if 'X' not in params or 'Y' not in params %}
        { action_raise_error("Missing X or Y coordinates! Usage: PLACE X=[value] Y=[value]") }
    {% else %}
        
        # Parse the inputs as floats
        {% set target_x = params.X|float %}
        {% set target_y = params.Y|float %}
        
        G90
        G1 Z{z_safe} F{speed_z}       
        G1 X{target_x} F{speed_xy}
        G1 Y{target_y} F{speed_xy}
        G1 Z{target_z} F{speed_z}
        PUMP_OFF
        G4 P{dwell_time}
        VALVE_OFF
        G4 P{dwell_time} 
        G1 Z{z_safe} F{speed_z}
    {% endif %}



#Cycle Macro
[gcode_macro Cycle]
description: Cycles the feeder
gcode:
      # --- CONFIGURATION VARIABLES ---
      {% set start_x = 35.0 %}
      {% set start_y = 160.0 %}
      
      {% set end_x = 70.0 %}
      {% set end_y = 160.0 %}      
      
      # Set the offset depending on how your spools are lined up. 
      {% set offset_x = 0.0 %}    # Distance between each spool on the X axis
      {% set offset_y = 0.0 %}     # Distance between each spool on the Y axis
      
      {% set z_safe = 80.0 %}      # Safe Z height for travel to avoid collisions
      {% set z_attached = 68.0 %}       # Z height to touch the component
      
      {% set FastSpeed_xy = 9000 %}    # XY travel speed (mm/min)
      {% set SlowSpeed_xy = 1000 %}
      {% set speed_z = 6000 %}     # Z plunge/retract speed (mm/min)
      {% set dwell_time = 250 %}   # Time to wait for vacuum to build (milliseconds)
      
      # --- INPUT PARAMETER ---
      # Get the requested spool number from the command. Default to 1 if none provided.
      {% set spool_num = params.SPOOL|default(1)|int %}
      
      # --- SAFETY CHECK ---
      {% if spool_num < 1 or spool_num > 5 %}
          { action_raise_error("Invalid spool number! Must be between 1 and 5.") }
      {% else %}
          
          # --- CALCULATE TARGET COORDINATES ---
          # Subtract 1 from the spool number so Spool 1 multiplies the offset by 0
          #{% set target_x = start_x + ((spool_num - 1) * offset_x) %}
          #{% set target_y = start_y + ((spool_num - 1) * offset_y) %}
          
          G90
          G1 Z{z_safe} F{speed_z}                                     #Retract Head
          G1 X{start_x+50} Y{start_y - 15} F{FastSpeed_xy}            #Move to homePos ahead and next to
          G1 X{start_x} F{FastSpeed_xy}               #Move inbetween arms
          G4 P{dwell_time}
          G1 Y{start_y} F{FastSpeed_xy}                    #move over arm
          G1 Z{z_attached-4} F{speed_z}                               #lower hook too far
          G1 Z{z_attached} F{speed_z}                                 #Retract slightly
          G4 P{dwell_time}                                            #Wait a second
          G1 X{end_x} Y{end_y} F{SlowSpeed_xy}
          G4 P{dwell_time}
          G1 X{start_x} Y{start_y} F{SlowSpeed_xy}
          G4 P{dwell_time}
          G1 Y{start_y - 15} Z{z_safe} F{FastSpeed_xy}
          G1 X{start_x+30} F{FastSpeed_xy} 
    {% endif %}